name: Rekonstrukcija istorije promena
on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (sa punom git istorijom)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # VAŽNO — preuzmi SVE commitove, ne samo poslednji

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rekonstruiši istoriju promena
        run: python3 scripts/rebuild_changelog.py

      - name: Commit i push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/changelog.json data/.prev_tower_ids.json
          git diff --staged --quiet || git commit -m "Rekonstruisana istorija promena iz git historije"
          git push
